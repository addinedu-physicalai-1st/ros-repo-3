# RL Inference Configuration
model:
  path: "../models/sac_actor.onnx"
  input_name: "state"
  output_name: "action"
  state_dim: 28
  action_dim: 2

observation:
  lidar_sectors: 24
  max_lidar_dist: 3.5
  goal_dist_scale: 5.0
  max_steps: 750

action_mapping:
  v_min: 0.0
  v_max: 0.26
  w_max: 1.0

pd_control:
  kp_v: 0.5
  kd_v: 0.1
  kp_w: 1.0
  kd_w: 0.2

navigation:
  goal_tolerance: 0.15
  lookahead_dist: 0.5
  control_period_ms: 50
  turn_first_enter_deg: 105
  turn_first_exit_deg: 80
  ema_alpha: 0.2
  angular_deadzone: 0.05
  safety_stop_dist: 0.12
  safety_scale_dist: 0.25
  pctrl_v_max: 0.12
  pctrl_w_max: 0.8

lidar:
  min_range: 0.15

emotion:
  dir: "../emotion"

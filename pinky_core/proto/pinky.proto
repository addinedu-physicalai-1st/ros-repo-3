syntax = "proto3";

package pinky.proto;

// ---------------------------------------------------------------------------
// Common Types
// ---------------------------------------------------------------------------
message Timestamp {
  int64 nanoseconds = 1;
}

message Vec2 {
  double x = 1;
  double y = 2;
}

message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Quaternion {
  double w = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

message Odometry {
  Timestamp stamp = 1;
  double x = 2;
  double y = 3;
  double theta = 4;
  double vx = 5;
  double vth = 6;
}

message ImuData {
  Timestamp stamp = 1;
  Quaternion orientation = 2;
  Vec3 angular_velocity = 3;
  Vec3 linear_acceleration = 4;
}

message LidarScan {
  Timestamp stamp = 1;
  float angle_min = 2;
  float angle_max = 3;
  float angle_increment = 4;
  float range_min = 5;
  float range_max = 6;
  repeated float ranges = 7;
}

message LidarSectors {
  Timestamp stamp = 1;
  repeated float sectors = 2; // size 24
}

message BatteryState {
  Timestamp stamp = 1;
  float voltage = 2;
  float percentage = 3;
  uint32 status = 4;
}

message JointState {
  Timestamp stamp = 1;
  repeated double position = 2; // size 2
  repeated double velocity = 3; // size 2
}

message IrSensor {
  repeated uint32 values = 1; // size 3
}

message UsSensor {
  float range = 1;
}

message CmdVel {
  float linear_x = 1;
  float angular_z = 2;
}

message LedCommand {
  uint32 command = 1;
  uint32 pixel_mask = 2;
  uint32 r = 3;
  uint32 g = 4;
  uint32 b = 5;
}

message LampCommand {
  uint32 mode = 1;
  uint32 r = 2;
  uint32 g = 3;
  uint32 b = 4;
  uint32 time_ms = 5;
}

message NavGoal {
  float x = 1;
  float y = 2;
  float theta = 3;
  string robot_id = 4; // To assign to specific robot
}

message NavCancel {
  string robot_id = 1;
}

message Pose2D {
  float x = 1;
  float y = 2;
  float theta = 3;
}

message RobotStatus {
  uint32 flags = 1;
}

message DebugLog {
  uint32 severity = 1;
  uint64 timestamp_ns = 2;
  string text = 3;
}

message CameraFrame {
  uint32 width = 1;
  uint32 height = 2;
  bytes jpeg_data = 3;
}

message MapData {
  uint32 width = 1;
  uint32 height = 2;
  float resolution = 3;
  float origin_x = 4;
  float origin_y = 5;
  float origin_theta = 6;
  bytes data = 7;
}

// ---------------------------------------------------------------------------
// Wrappers for ZeroMQ Transports
// ---------------------------------------------------------------------------

// Used on PUB socket from Robot -> PC
message SensorTelemetry {
  string robot_id = 1;
  
  oneof payload {
    Odometry odom = 2;
    ImuData imu = 3;
    LidarScan lidar_scan = 4;
    LidarSectors lidar_sectors = 5;
    BatteryState battery = 6;
    JointState joint_state = 7;
    IrSensor ir_sensor = 8;
    UsSensor us_sensor = 9;
    RobotStatus status = 10;
    DebugLog log = 11;
  }
}

// Sent on a separate PUB/SUB or same depending on bandwidth
message VideoStream {
  string robot_id = 1;
  CameraFrame frame = 2;
}

// Request/Reply from PC -> Robot
message ControlCommand {
  string robot_id = 1;
  uint64 request_id = 2; // for REQ/REP tracking
  
  oneof command {
    CmdVel cmd_vel = 3;
    LedCommand led = 4;
    LampCommand lamp = 5;
    NavGoal nav_goal = 6;
    NavCancel nav_cancel = 7;
    Pose2D set_pose = 8;
  }
}

// Reply from Robot -> PC
message CommandAck {
  string robot_id = 1;
  uint64 request_id = 2;
  bool success = 3;
  string message = 4;
}